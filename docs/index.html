<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeVine — Community Supporting Community</title>
  <meta name="description" content="LifeVine connects people with local churches, ministries, support groups, and community organizations making a real difference." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F0E8;
      color: #1C1917;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .wordmark { font-size: 48px; font-weight: 800; letter-spacing: -2px; margin-bottom: 12px; }
    .life { color: #1B5E20; }
    .vine { color: #4CAF50; }
    .tagline { font-size: 18px; color: #78716C; margin-bottom: 36px; line-height: 1.5; }
    .pill {
      display: inline-block;
      background: #FFFFFF;
      border: 1px solid #E5DDD4;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 14px;
      color: #1C1917;
      margin-bottom: 40px;
    }
    .links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    a.btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    a.btn:hover { opacity: 0.82; }
    .btn-green  { background: #2D6A4F; color: #fff; }
    .btn-outline { background: #fff; color: #2D6A4F; border: 1.5px solid #2D6A4F; }
    .legal { margin-top: 36px; font-size: 12px; color: #A8A29E; }
    .legal a { color: #2D6A4F; text-decoration: none; font-weight: 600; }
    .legal a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wordmark"><span class="life">Life</span><span class="vine">Vine</span></div>
  <p class="tagline">Community Supporting Community.<br/>Real help. Real people. Real connection.</p>
  <div class="pill">Available on the App Store</div>
  <div class="links">
    <a class="btn btn-green" href="upgrade.html">Contributor Plans</a>
    <a class="btn btn-outline" href="mailto:hello@lifevine.app">Contact Us</a>
  </div>
  <p class="legal">
    <a href="privacy.html">Privacy Policy</a>
    &nbsp;·&nbsp;
    <a href="terms.html">Terms of Service</a>
    &nbsp;·&nbsp;
    <a href="donations.html">Donation Policy</a>
  </p>
</body>
</html>
